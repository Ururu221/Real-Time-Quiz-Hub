<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuizHub — Гра</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <div class="top-progress" id="topProgress">
        <div class="top-progress-fill" id="progressBar"></div>
    </div>

    <div class="wrapper">

        <header class="header">
            <div class="logo">Quiz<span>Hub</span></div>
            <div class="header-right">
                <a class="link-back" href="./index.html">← До вікторин</a>
                <button type="button" class="logout-btn" onclick="logout()">Вийти</button>
                <div class="connection-dot" id="connectionDot" title="Підключення"></div>
            </div>
        </header>

        <!-- Екран входу -->
        <section id="startArea" class="screen screen--start">
            <span class="eyebrow eyebrow--live start-eyebrow">
                <span class="dot"></span> Live quiz &mdash; No. 01
            </span>
            <h1 class="start-title">Готовий<br>до бою?</h1>
            <p class="start-sub">Введи нік і приєднуйся до вікторини. Грай у реальному часі проти всіх онлайн.</p>
            <div class="input-wrap">
                <input type="text" id="nickInput" class="nick-input" placeholder="Твій нікнейм" maxlength="20" autocomplete="off" />
            </div>
            <button id="startBtn" class="btn">
                <span>Почати</span>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </button>
        </section>

        <!-- Екран квізу -->
        <section id="quizArea" class="screen screen--quiz d-none">
            <div class="quiz-layout">

                <div class="quiz-main">
                    <div class="quiz-meta">
                        <span class="progress-label" id="progressLabel">Question <strong>01</strong> &mdash; of 10</span>
                    </div>

                    <div class="timer-wrap" id="timerWrap">
                        <span class="timer-number" id="timerNumber">30</span>
                        <div class="timer-track">
                            <div class="timer-fill" id="timerFill"></div>
                        </div>
                    </div>

                    <div id="questionContainer" class="question-container"></div>

                    <button id="submitBtn" class="btn btn-submit">
                        <span>Відповісти</span>
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>

                <aside class="leaderboard-panel">
                    <div class="lb-header">
                        <span class="lb-title">Leaderboard</span>
                        <span class="lb-live">Live</span>
                    </div>
                    <ul class="lb-list" id="leaderboardList"></ul>
                </aside>

            </div>
        </section>

        <!-- Екран результату -->
        <section id="resultArea" class="screen screen--result d-none">
            <span class="eyebrow result-eyebrow">
                <span id="resultEmoji" class="result-mark">🏆</span>
                Final score
            </span>
            <h2 class="result-title">Квіз<br>завершено.</h2>
            <div class="result-score-wrap">
                <span class="result-score" id="resultScore">0</span>
                <span class="result-score-of" id="resultScoreOf">/ 0</span>
            </div>
            <div class="result-meta">
                <span>Player &mdash; <strong id="resultNick"></strong></span>
                <span id="resultPct">0%</span>
            </div>

            <!-- Points earned + any freshly unlocked badges (room play only) -->
            <div id="resultPoints" class="result-points d-none"></div>
            <div id="resultBadges" class="result-badges d-none"></div>

            <!-- Room leaderboard — all participants ranked by session score -->
            <div id="roomLeaderboardWrap" class="room-lb-wrap d-none">
                <div class="lb-header">
                    <span class="lb-title">Рейтинг кімнати</span>
                </div>
                <ul class="lb-list" id="roomLeaderboard"></ul>
            </div>

            <button class="btn btn--ghost" onclick="location.reload()">
                <span>Грати знову</span>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
            </button>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
