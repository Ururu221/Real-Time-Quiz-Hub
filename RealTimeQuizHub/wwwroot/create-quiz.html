<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuizHub — Нова вікторина</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <div class="wrapper">

        <header class="header">
            <div class="logo">Quiz<span>Hub</span></div>
            <div class="header-right">
                <a class="link-back" href="./index.html">← До вікторин</a>
                <button type="button" class="logout-btn" onclick="logout()">Вийти</button>
            </div>
        </header>

        <section class="screen screen--start form-screen">

            <span class="eyebrow start-eyebrow"><span class="dot"></span> Тільки для адмінів</span>
            <h1 class="start-title form-title">Нова вікторина.</h1>

            <form id="quizForm" class="room-form" novalidate>

                <!-- Section 1 — Basic info -->
                <div class="form-section">
                    <h2 class="section-title">1. Основна інформація</h2>

                    <div class="field">
                        <label class="field-label" for="quizTitle">Назва вікторини</label>
                        <input type="text" id="quizTitle" class="nick-input" maxlength="100" placeholder="Напр. Столиці світу" required />
                    </div>

                    <div class="field">
                        <label class="field-label" for="quizDesc">Опис (необов'язково)</label>
                        <textarea id="quizDesc" class="nick-input textarea" maxlength="500" rows="2" placeholder="Коротко про вікторину"></textarea>
                    </div>
                </div>

                <!-- Section 2 — Timer -->
                <div class="form-section">
                    <h2 class="section-title">2. Налаштування таймера</h2>

                    <div class="field">
                        <label class="switch-row">
                            <span class="field-label">Увімкнути таймер</span>
                            <span class="switch">
                                <input type="checkbox" id="hasTimer" />
                                <span class="switch-track"></span>
                            </span>
                        </label>
                    </div>

                    <div id="timerSettings" class="d-none">
                        <div class="field">
                            <label class="field-label" for="timerSeconds">Секунд на питання</label>
                            <input type="number" id="timerSeconds" class="nick-input" min="10" max="120" value="30" />
                        </div>

                        <div class="field">
                            <label class="field-label" for="timerImpact">
                                Вплив таймера на бали: <strong id="timerImpactValue">0.0</strong>
                            </label>
                            <input type="range" id="timerImpact" class="slider" min="0" max="1" step="0.1" value="0" />
                            <p class="field-hint">0 — час не впливає на бали. 1 — швидка відповідь дає максимальний бонус.</p>
                            <p class="field-hint timer-preview" id="timerPreview"></p>
                        </div>
                    </div>
                </div>

                <!-- Section 3 — Questions -->
                <div class="form-section">
                    <h2 class="section-title">3. Питання</h2>
                    <div id="questionsContainer"></div>
                    <button type="button" id="addQuestionBtn" class="btn btn--ghost btn--sm add-btn">
                        + Додати питання
                    </button>
                </div>

                <p id="formError" class="auth-error d-none"></p>
                <p id="formSuccess" class="form-success d-none"></p>

                <button type="submit" id="submitBtn" class="btn">
                    <span>Створити вікторину</span>
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>

            </form>

        </section>

    </div>

    <script src="./js/common.js"></script>
    <script src="./js/create-quiz.js"></script>
</body>
</html>
