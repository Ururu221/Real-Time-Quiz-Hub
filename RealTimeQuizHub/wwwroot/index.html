<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuizHub</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <div class="bg-grid"></div>
    <div class="glow-orb glow-1"></div>
    <div class="glow-orb glow-2"></div>

    <div class="wrapper">

        <header class="header">
            <div class="logo">QUIZ<span>HUB</span></div>
            <div class="connection-dot" id="connectionDot" title="Підключення..."></div>
        </header>

        <!-- Екран входу -->
        <section id="startArea" class="screen screen--start">
            <div class="start-card">
                <div class="start-badge">LIVE</div>
                <h1 class="start-title">Готовий до бою?</h1>
                <p class="start-sub">Введи нік і приєднуйся до вікторини</p>
                <div class="input-wrap">
                    <input type="text" id="nickInput" class="nick-input" placeholder="Твій нікнейм" maxlength="20" autocomplete="off" />
                    <span class="input-icon">⚡</span>
                </div>
                <button id="startBtn" class="btn-start">
                    <span>Почати</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </button>
            </div>
        </section>

        <!-- Екран квізу -->
        <section id="quizArea" class="screen screen--quiz d-none">
            <div class="quiz-layout">

                <div class="quiz-main">
                    <div class="progress-bar-wrap">
                        <div class="progress-bar-track">
                            <div class="progress-bar-fill" id="progressBar"></div>
                        </div>
                        <span class="progress-label" id="progressLabel">1 / 10</span>
                    </div>

                    <div id="questionContainer" class="question-container"></div>

                    <button id="submitBtn" class="btn-submit">
                        <span>Відповісти</span>
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>

                <aside class="leaderboard-panel">
                    <div class="lb-header">
                        <span class="lb-title">Лідерборд</span>
                        <span class="lb-live">● LIVE</span>
                    </div>
                    <ul class="lb-list" id="leaderboardList"></ul>
                </aside>

            </div>
        </section>

        <!-- Екран результату -->
        <section id="resultArea" class="screen screen--result d-none">
            <div class="result-card">
                <div class="result-emoji" id="resultEmoji">🏆</div>
                <h2 class="result-title">Квіз завершено!</h2>
                <div class="result-score" id="resultScore">0 / 0</div>
                <p class="result-nick" id="resultNick"></p>
                <button class="btn-start" onclick="location.reload()">
                    <span>Грати знову</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>
                </button>
            </div>
        </section>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@latest/dist/browser/signalr.min.js"></script>
    <script src="./js/script.js"></script>
</body>
</html>
