<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>QuizHub — Вікторини</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./css/style.css" />
</head>
<body>

    <div class="wrapper">

        <header class="header">
            <div class="logo">Quiz<span>Hub</span></div>
            <div class="header-right">
                <span class="user-tag" id="userTag"></span>
                <button type="button" class="logout-btn" onclick="logout()">Вийти</button>
            </div>
        </header>

        <section class="lobby">

            <div class="lobby-grid">

                <!-- Quizzes column -->
                <div class="lobby-main">
                    <div class="lobby-head">
                        <div>
                            <span class="eyebrow start-eyebrow"><span class="dot"></span> Вікторини</span>
                            <h1 class="lobby-title">Доступні вікторини</h1>
                        </div>
                        <a href="./create-quiz.html" id="createQuizBtn" class="btn btn--sm d-none">
                            <span>+ Створити вікторину</span>
                        </a>
                    </div>

                    <div id="quizzesState" class="lobby-state">Завантаження вікторин…</div>
                    <div id="quizzesGrid" class="rooms-grid"></div>
                </div>

                <!-- Global leaderboard widget -->
                <aside class="leaderboard-panel lobby-lb">
                    <div class="lb-header">
                        <span class="lb-title">Глобальний рейтинг</span>
                        <span class="lb-live">Топ 10</span>
                    </div>
                    <ul class="lb-list" id="globalLeaderboard"></ul>
                    <p class="lb-note">Дані будуть підключені пізніше.</p>
                </aside>

            </div>

        </section>

    </div>

    <script src="./js/common.js"></script>
    <script src="./js/quizzes.js"></script>
</body>
</html>
